services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # Порт для общения сервисов (Java и Python стучатся сюда)
      - "15672:15672" # Порт для веб-интерфейса в браузере
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    command:
      - /usr/local/bin/etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd-data
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # API порт (через него Nginx и Java скачивают файлы)
      - "9001:9001" # Web-интерфейс (чтобы ты мог зайти через браузер)
    volumes:
      - minio_data:/data
    restart: unless-stopped

  auth-service:
      build: ./auth-service-go
      ports:
        - "8081:8081"
      environment:
        - ETCD_URL=etcd:2379
        - REDIS_URL=redis:6379
      depends_on:
        - etcd
        - redis

  backend-service:
    build: ./backend-java
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - minio
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_REDIS_HOST=redis
      - SHOP_MINIO_URL=http://minio:9000
      - SHOP_MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - SHOP_MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - SHOP_MINIO_BUCKET=products
      - SHOP_MINIO_PUBLIC_BASE_PATH=http://localhost:3000/media

  order-worker:
      build: ./order-worker-python
      environment:
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_HOST=postgres
        - RABBITMQ_HOST=rabbitmq
      depends_on:
        - postgres
        - rabbitmq

  frontend:
      build: ./frontend-react
      depends_on:
        - backend-service
        - auth-service

  gateway:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend-service
      - auth-service
      - minio

volumes:
  pg_data:
  etcd_data:
  minio_data:

