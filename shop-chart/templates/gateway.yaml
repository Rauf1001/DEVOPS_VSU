apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: shop-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shop-cert
spec:
  secretName: shop-tls-secret
  issuerRef:
    name: shop-issuer
    kind: Issuer
  commonName: localhost
  dnsNames:
    - localhost
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shop-gateway
  annotations:
    cert-manager.io/issuer: shop-issuer
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "localhost"
      tls:
        mode: Terminate
        certificateRefs:
          - name: shop-tls-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shop-routes
spec:
  parentRefs:
    - name: shop-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: auth-go-svc
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend-java-svc
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /shop-images
      backendRefs:
        - name: minio
          port: 9000

    - matches:
        - path:
            type: PathPrefix
            value: /media
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: minio
          port: 9000

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-react-svc
          port: 80