apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-java
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend-java
  template:
    metadata:
      labels:
        app: backend-java
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.dbClusterName }}-app
                  key: dbname
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.global.dbClusterName }}-rw:5432/$(DB_NAME)"

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.dbClusterName }}-app
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.dbClusterName }}-app
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              value: "redis-master"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
            - name: SHOP_MINIO_ENDPOINT
              value: "http://minio:9000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-java-svc
spec:
  selector:
    app: backend-java
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.backend.port }}